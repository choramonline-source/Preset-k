<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buka Kamera Xiaomi</title>

  <meta name="theme-color" content="#4f46e5">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#4f46e5,#06b6d4);
      overflow: hidden;
    }

    .card {
      width: 340px;
      padding: 32px;
      border-radius: 28px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(14px);
      color: white;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    p {
      margin-top: 10px;
      opacity: 0.9;
      line-height: 1.5;
      font-size: 14px;
    }

    button {
      margin-top: 24px;
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: white;
      color: #111827;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .small {
      margin-top: 14px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="icon">📸</div>

  <h1>Buka Kamera Xiaomi</h1>

  <p>
    Kompatibel dengan Google Lens,
    Scanner Xiaomi, dan aplikasi QR lainnya.
  </p>

  <button onclick="openCamera()">
    BUKA KAMERA
  </button>

  <div class="small">
    HyperOS / MIUI Supported
  </div>
</div>

<script>
function openCamera() {
  window.location.href =
  'intent://#Intent;action=android.media.action.STILL_IMAGE_CAMERA;end';
}
</script>

</body>
</html>
